name: Build InspectorCam

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd itp-foto/server && npm ci

      - name: Build macOS (.dmg)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: cd itp-foto/server && npm run build -- --mac --publish always

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd itp-foto/server && npm ci

      - name: Build Windows (.exe)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: cd itp-foto/server && npm run build -- --win --publish always
