name: Build InspectorCam

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd itp-foto/server && npm ci

      - name: Build macOS (.dmg)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: cd itp-foto/server && npm run build -- --mac --publish always

      - name: Upload update-mac.command to release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          RELEASE_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"update-mac.command" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=update-mac.command"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd itp-foto/server && npm ci

      - name: Build Windows (.exe)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: cd itp-foto/server && npm run build -- --win --publish always
