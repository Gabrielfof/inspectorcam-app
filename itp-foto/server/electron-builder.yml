appId: ro.inspectorcam.app
productName: InspectorCam
copyright: InspectorCam © 2026

publish:
  provider: github
  owner: Gabrielfof
  repo: inspectorcam-app
  releaseType: release

directories:
  output: ../../dist
  buildResources: build-resources

files:
  - src/**/*
  - "!src/**/*.test.js"
  - node_modules/**/*
  - "!node_modules/electron/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/@electron/**"
  - "!node_modules/nodemon/**"

extraResources:
  - from: "../pwa"
    to: "pwa"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: "build-resources/icon.ico"
  # Adaugă excepție în Windows Firewall automat
  requestedExecutionLevel: requireAdministrator

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  installerLanguages: [en_US]
  include: build-resources/installer.nsh

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: "build-resources/icon.icns"
  category: public.app-category.business
